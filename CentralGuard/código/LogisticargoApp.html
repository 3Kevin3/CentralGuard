<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LOGISTICARGO</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    input, select, textarea, button { font-family: inherit; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;



// ── Colors from new design ───────────────────────────────────────────────────
const PRIMARY = "#1b4d3e";
const SECONDARY = "#5b3fa6";
const DANGER = "#ef4444";
const WARNING = "#f59e0b";
const SUCCESS = "#10b981";
const GRAY = "#64748b";
const BG = "#f4f6f8";
const SURFACE = "#ffffff";
const BORDER = "#e2e8f0";
const TEXT_MAIN = "#333333";
const TEXT_MUTED = "#64748b";

// ── Types ────────────────────────────────────────────────────────────────────
// Admin: dashboard, request, quote, agenda, vehicles, employees, payments, reports, tracking
// Driver: d_dashboard, d_services, d_service_detail, d_vehicle, d_profile
// Client: c_dashboard, c_request, c_tracking, c_history, c_profile

// ── Shared UI Components ─────────────────────────────────────────────────────

function Sidebar({ items, active, onNav, username, initials, onLogout }) {
  return (
    <aside style={{ width: 256, background: SURFACE, borderRight: `1px solid ${BORDER}`, display: "flex", flexDirection: "column", flexShrink: 0, height: "100vh" }}>
      <div style={{ padding: "24px 24px 16px" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <div style={{ width: 36, height: 36, background: PRIMARY, borderRadius: 8, display: "flex", alignItems: "center", justifyContent: "center" }}>
            <span style={{ color: "white", fontSize: 13, fontWeight: 700, letterSpacing: -1 }}>LC</span>
          </div>
          <span style={{ fontFamily: "Georgia, serif", fontWeight: 700, fontSize: 16, color: PRIMARY, fontStyle: "italic", letterSpacing: 1 }}>LOGISTICARGO</span>
        </div>
      </div>
      <nav style={{ flex: 1, padding: "0 16px", display: "flex", flexDirection: "column", gap: 4 }}>
        {items.map((item) => {
          const isActive = active === item.id;
          return (
            <button
              key={item.id}
              onClick={() => onNav(item.id)}
              style={{
                display: "flex", alignItems: "center", gap: 12,
                padding: "10px 16px", borderRadius: 8, border: "none", cursor: "pointer",
                background: isActive ? PRIMARY : "transparent",
                color: isActive ? "white" : TEXT_MUTED,
                fontWeight: isActive ? 600 : 400, fontSize: 14,
                transition: "all 0.15s", textAlign: "left",
              }}
            >
              <span style={{ fontSize: 18 }}>{item.icon}</span>
              {item.label}
            </button>
          );
        })}
      </nav>
      <div style={{ padding: "16px", borderTop: `1px solid ${BORDER}` }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8 }}>
          <div style={{ width: 36, height: 36, borderRadius: "50%", background: SECONDARY, display: "flex", alignItems: "center", justifyContent: "center", color: "white", fontWeight: 700, fontSize: 13 }}>{initials}</div>
          <div>
            <p style={{ fontSize: 13, fontWeight: 600, color: TEXT_MAIN, margin: 0 }}>{username}</p>
            <p style={{ fontSize: 11, color: TEXT_MUTED, margin: 0 }}>En línea</p>
          </div>
        </div>
        <button onClick={onLogout} style={{ width: "100%", padding: "8px 12px", borderRadius: 8, border: `1px solid ${BORDER}`, background: "white", color: DANGER, fontSize: 13, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 6, fontWeight: 600 }}>
          Cerrar Sesión
        </button>
      </div>
    </aside>
  );
}

function TopBar({ breadcrumb, title, action }) {
  return (
    <header style={{ background: SURFACE, borderBottom: `1px solid ${BORDER}`, height: 64, display: "flex", alignItems: "center", justifyContent: "space-between", padding: "0 32px", flexShrink: 0 }}>
      <div>
        <p style={{ fontSize: 12, color: TEXT_MUTED, margin: "0 0 2px" }}>{breadcrumb}</p>
        <h2 style={{ fontSize: 22, fontWeight: 700, color: TEXT_MAIN, margin: 0 }}>{title}</h2>
      </div>
      <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
        {action}
        <button onClick={() => alert("Sin notificaciones nuevas.")} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 14, color: TEXT_MUTED, padding: "6px 10px", borderRadius: 8, border: `1px solid ${BORDER}` }}>Notif.</button>
      </div>
    </header>
  );
}

function Card({ children, style = {} }) {
  return (
    <div style={{ background: SURFACE, borderRadius: 12, border: `1px solid ${BORDER}`, boxShadow: "0 1px 3px rgba(0,0,0,0.04)", ...style }}>
      {children}
    </div>
  );
}

function Badge({ label, color, bg }) {
  return (
    <span style={{ background: bg || color + "18", color: color, fontSize: 11, fontWeight: 600, padding: "3px 10px", borderRadius: 999, whiteSpace: "nowrap" }}>
      {label}
    </span>
  );
}

function Input({ label, type = "text", placeholder, value, onChange, style = {} }) {
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 6, ...style }}>
      {label && <label style={{ fontSize: 13, fontWeight: 500, color: TEXT_MAIN }}>{label}</label>}
      <input
        type={type}
        placeholder={placeholder}
        value={value}
        onChange={(e) => onChange(e.target.value)}
        style={{ border: `1px solid ${BORDER}`, borderRadius: 8, padding: "10px 14px", fontSize: 14, outline: "none", color: TEXT_MAIN, background: "white" }}
      />
    </div>
  );
}

function Btn({ children, onClick, color = PRIMARY, outline = false, size = "md", disabled = false, fullWidth = false }) {
  const pad = size === "sm" ? "7px 14px" : "10px 22px";
  const fs = size === "sm" ? 13 : 14;
  return (
    <button
      disabled={disabled}
      onClick={onClick}
      style={{
        padding: pad, borderRadius: 8, fontSize: fs, fontWeight: 600, cursor: disabled ? "not-allowed" : "pointer",
        border: outline ? `1.5px solid ${color}` : "none",
        background: outline ? "white" : (disabled ? "#ccc" : color),
        color: outline ? color : "white",
        display: "inline-flex", alignItems: "center", gap: 6,
        opacity: disabled ? 0.6 : 1, transition: "opacity 0.15s",
        width: fullWidth ? "100%" : undefined, justifyContent: fullWidth ? "center" : undefined,
      }}
    >
      {children}
    </button>
  );
}

function StatCard({ label, value, icon, trend, trendColor = SUCCESS }) {
  return (
    <Card style={{ padding: "24px" }}>
      <p style={{ fontSize: 13, color: TEXT_MUTED, marginBottom: 8 }}>{label}</p>
      <h3 style={{ fontSize: 32, fontWeight: 700, color: TEXT_MAIN, margin: "0 0 8px" }}>{value}</h3>
      {trend && <div style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 12, color: trendColor }}>{trend}</div>}
    </Card>
  );
}

function PageLayout({ sidebar, topBar, children }) {
  return (
    <div style={{ display: "flex", height: "100vh", background: BG, overflow: "hidden" }}>
      {sidebar}
      <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>
        {topBar}
        <main style={{ flex: 1, overflowY: "auto", padding: 32 }}>
          {children}
        </main>
      </div>
    </div>
  );
}

// ── LOGIN PAGE ───────────────────────────────────────────────────────────────
function LoginPage({ onLogin }) {
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [role, setRole] = useState("admin");
  const [view, setView] = useState("login"); // login | register | recover

  if (view === "register") return <RegisterPage onBack={() => setView("login")} onSuccess={() => onLogin("cliente")} />;
  if (view === "recover") return <RecoverPage onBack={() => setView("login")} />;

  return (
    <div style={{ minHeight: "100vh", background: BG, display: "flex", alignItems: "center", justifyContent: "center", padding: 16 }}>
      <div style={{ display: "flex", background: SURFACE, borderRadius: 16, boxShadow: "0 4px 24px rgba(0,0,0,0.08)", overflow: "hidden", maxWidth: 900, width: "100%" }}>
        {/* Left panel */}
        <div style={{ flex: 1, background: PRIMARY, padding: "48px 40px", display: "flex", flexDirection: "column", justifyContent: "center", alignItems: "center", textAlign: "center" }}>
          <h1 style={{ fontSize: 40, fontWeight: 700, color: "white", fontStyle: "italic", fontFamily: "Georgia, serif", marginBottom: 16, letterSpacing: 2 }}>LOGISTICARGO</h1>
          <div style={{ width: 180, height: 3, background: "rgba(255,255,255,0.25)", borderRadius: 99, marginBottom: 32 }} />
          <div style={{ width: 120, height: 120, background: "rgba(255,255,255,0.12)", borderRadius: 16, display: "flex", alignItems: "center", justifyContent: "center" }}><span style={{ fontFamily: "Georgia, serif", fontStyle: "italic", fontWeight: 700, fontSize: 28, color: "rgba(255,255,255,0.9)", letterSpacing: 1 }}>LOGISTI<br/>CARGO</span></div>
          <p style={{ color: "rgba(255,255,255,0.7)", marginTop: 24, fontSize: 14 }}>Sistema de Gestión de Mudanzas</p>
        </div>
        {/* Right panel */}
        <div style={{ flex: 1, padding: "48px 40px" }}>
          <p style={{ color: TEXT_MUTED, marginBottom: 28, fontSize: 14 }}>Accede a tu cuenta de LOGISTICARGO SYSTEM</p>

          {/* Role selector */}
          <div style={{ display: "flex", borderRadius: 8, overflow: "hidden", border: `1px solid ${BORDER}`, marginBottom: 24 }}>
            {[["admin", "Administrador"], ["conductor", "Conductor"], ["cliente", "Cliente"]].map(([r, label]) => (
              <button key={r} onClick={() => setRole(r)}
                style={{ flex: 1, padding: "9px 0", border: "none", cursor: "pointer", fontSize: 12, fontWeight: 600, background: role === r ? PRIMARY : "white", color: role === r ? "white" : TEXT_MUTED, transition: "all 0.15s" }}>
                {label}
              </button>
            ))}
          </div>

          <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
            <Input label="Correo Electrónico" placeholder="tu.correo@empresa.com" value={email} onChange={setEmail} />
            <div>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
                <label style={{ fontSize: 13, fontWeight: 500, color: TEXT_MAIN }}>Contraseña</label>
                <button onClick={() => setView("recover")} style={{ fontSize: 13, color: PRIMARY, background: "none", border: "none", cursor: "pointer" }}>¿Olvidaste tu contraseña?</button>
              </div>
              <Input type="password" placeholder="••••••••" value={password} onChange={setPassword} />
            </div>
            <Btn fullWidth onClick={() => onLogin(role)}>Iniciar Sesión</Btn>
            <p style={{ textAlign: "center", fontSize: 13, color: TEXT_MUTED }}>
              ¿No tienes una cuenta?{" "}
              <button onClick={() => setView("register")} style={{ color: PRIMARY, fontWeight: 600, background: "none", border: "none", cursor: "pointer" }}>Regístrate aquí</button>
            </p>
          </div>
        </div>
      </div>
    </div>
  );
}

function RegisterPage({ onBack, onSuccess }) {
  const [name, setName] = useState(""); const [email, setEmail] = useState("");
  const [pass, setPass] = useState(""); const [confirm, setConfirm] = useState("");
  return (
    <div style={{ minHeight: "100vh", background: BG }}>
      <header style={{ background: SURFACE, borderBottom: `1px solid ${BORDER}`, padding: "0 32px", height: 64, display: "flex", alignItems: "center" }}>
        <span style={{ fontFamily: "Georgia, serif", fontWeight: 700, color: PRIMARY, fontStyle: "italic", fontSize: 18 }}>LOGISTICARGO</span>
      </header>
      <div style={{ maxWidth: 600, margin: "48px auto", padding: "0 16px" }}>
        <Card style={{ padding: "40px" }}>
          <h2 style={{ fontSize: 28, fontWeight: 700, color: TEXT_MAIN, marginBottom: 6 }}>Registro de Cliente</h2>
          <p style={{ color: TEXT_MUTED, marginBottom: 32, fontSize: 14 }}>Completa los siguientes campos para crear tu cuenta.</p>
          <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
            <Input label="Nombre Completo" placeholder="Ej: Juan Pérez" value={name} onChange={setName} />
            <Input label="Correo Electrónico" placeholder="tu.correo@empresa.com" value={email} onChange={setEmail} />
            <Input label="Contraseña" type="password" placeholder="••••••••" value={pass} onChange={setPass} />
            <Input label="Confirmar Contraseña" type="password" placeholder="••••••••" value={confirm} onChange={setConfirm} />
            <div style={{ display: "flex", gap: 12, marginTop: 8 }}>
              <Btn onClick={onBack} outline>Atrás</Btn>
              <Btn onClick={onSuccess} fullWidth>Registrarme</Btn>
            </div>
          </div>
        </Card>
      </div>
    </div>
  );
}

function RecoverPage({ onBack }) {
  const [email, setEmail] = useState("");
  return (
    <div style={{ minHeight: "100vh", background: BG, display: "flex", alignItems: "center", justifyContent: "center", padding: 16 }}>
      <Card style={{ padding: "40px", maxWidth: 440, width: "100%", textAlign: "center" }}>
        <span style={{ fontFamily: "Georgia, serif", fontWeight: 700, color: PRIMARY, fontStyle: "italic", fontSize: 18, display: "block", marginBottom: 24 }}>LOGISTICARGO</span>
        <h2 style={{ fontSize: 24, fontWeight: 700, color: TEXT_MAIN, marginBottom: 8 }}>Recuperar Contraseña</h2>
        <p style={{ color: TEXT_MUTED, fontSize: 14, marginBottom: 28 }}>Introduce tu correo electrónico para recibir un código de verificación.</p>
        <Input label="Correo Electrónico" placeholder="tu.correo@empresa.com" value={email} onChange={setEmail} style={{ textAlign: "left", marginBottom: 20 }} />
        <Btn fullWidth onClick={onBack}>Enviar Código de Verificación</Btn>
        <button onClick={onBack} style={{ display: "block", margin: "16px auto 0", fontSize: 13, color: PRIMARY, background: "none", border: "none", cursor: "pointer" }}>Volver al inicio de sesión</button>
      </Card>
    </div>
  );
}

// ── ADMIN PAGES ──────────────────────────────────────────────────────────────

function AdminLayout({ page, setPage, children, title, breadcrumb, action }) {
  const navItems = [
    { id: "dashboard", icon: "", label: "Dashboard" },
    { id: "request", icon: "", label: "Solicitar Mudanza" },
    { id: "agenda", icon: "", label: "Agenda" },
    { id: "vehicles", icon: "", label: "Vehículos" },
    { id: "employees", icon: "", label: "Empleados" },
    { id: "payments", icon: "", label: "Pagos" },
    { id: "reports", icon: "", label: "Reportes" },
    { id: "tracking", icon: "", label: "Seguimiento" },
  ];
  return (
    <PageLayout
      sidebar={<Sidebar items={navItems} active={page} onNav={setPage} username="Admin García" initials="AG" onLogout={() => setPage("login")} />}
      topBar={<TopBar breadcrumb={breadcrumb} title={title} action={action} />}
    >
      {children}
    </PageLayout>
  );
}

function AdminDashboard({ page, setPage }) {
  const activity = [
    { action: "Mudanza #1234 programada", user: "Juan Pérez", date: "2026-10-26", status: "Pendiente" },
    { action: "Vehículo V-005 asignado", user: "María García", date: "2026-10-25", status: "Completado" },
    { action: "Nuevo empleado registrado", user: "Admin", date: "2026-10-24", status: "Activo" },
  ];
  const quickAccess = [
    { label: "Solicitar Mudanza", icon: "", id: "request" },
    { label: "Gestionar Vehículos", icon: "", id: "vehicles" },
    { label: "Ver Agenda", icon: "", id: "agenda" },
    { label: "Gestionar Empleados", icon: "", id: "employees" },
    { label: "Ver Seguimiento", icon: "", id: "tracking" },
    { label: "Ver Pagos", icon: "", id: "payments" },
  ];
  return (
    <AdminLayout page={page} setPage={setPage} title="Dashboard Principal" breadcrumb="Inicio / Dashboard"
      action={<Btn onClick={() => setPage("request")}>Nueva Solicitud</Btn>}>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 20, marginBottom: 28 }}>
        <StatCard label="Mudanzas Pendientes" value="12" trend="-2 este mes" trendColor={DANGER} />
        <StatCard label="Vehículos Disponibles" value="8" trend="+1 esta semana" trendColor={SUCCESS} />
        <StatCard label="Empleados Activos" value="25" trend="+1 este mes" trendColor={SUCCESS} />
        <StatCard label="Ingresos del Mes" value="$15,000" trend="+12% vs anterior" trendColor={SUCCESS} />
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 24, marginBottom: 24 }}>
        <Card style={{ padding: 24 }}>
          <h3 style={{ fontSize: 16, fontWeight: 700, color: TEXT_MAIN, marginBottom: 20 }}>Actividad Reciente</h3>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
            <thead>
              <tr style={{ borderBottom: `1px solid ${BORDER}` }}>
                {["Acción", "Usuario", "Fecha", "Estado"].map(h => (
                  <th key={h} style={{ padding: "0 0 10px", textAlign: "left", fontSize: 11, fontWeight: 700, color: TEXT_MUTED, textTransform: "uppercase", letterSpacing: 0.5 }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {activity.map((a, i) => (
                <tr key={i} style={{ borderBottom: i < activity.length - 1 ? `1px solid ${BORDER}` : "none" }}>
                  <td style={{ padding: "12px 0", color: TEXT_MAIN }}>{a.action}</td>
                  <td style={{ padding: "12px 0", color: TEXT_MUTED }}>{a.user}</td>
                  <td style={{ padding: "12px 0", color: TEXT_MUTED }}>{a.date}</td>
                  <td style={{ padding: "12px 0" }}>
                    <Badge label={a.status} color={a.status === "Completado" ? SUCCESS : a.status === "Pendiente" ? WARNING : PRIMARY} />
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </Card>
        <Card style={{ padding: 24 }}>
          <h3 style={{ fontSize: 16, fontWeight: 700, color: TEXT_MAIN, marginBottom: 20 }}>Accesos Rápidos</h3>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12 }}>
            {quickAccess.map((q) => (
              <button key={q.id} onClick={() => setPage(q.id)}
                style={{ padding: "16px 8px", borderRadius: 10, border: `1px solid ${BORDER}`, background: "white", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 6, fontSize: 12, fontWeight: 600, color: TEXT_MAIN, transition: "all 0.15s" }}
                onMouseEnter={e => e.currentTarget.style.background = "#f8fffe"}
                onMouseLeave={e => e.currentTarget.style.background = "white"}
              >
                <span style={{ fontSize: 22 }}>{q.icon}</span>
                <span style={{ textAlign: "center", lineHeight: 1.3 }}>{q.label}</span>
              </button>
            ))}
          </div>
        </Card>
      </div>
    </AdminLayout>
  );
}

function RequestPage({ page, setPage }) {
  const [form, setForm] = useState({ origin: "", destination: "", date: "", time: "", type: "", volume: "", notes: "" });
  const set = (k) => (v) => setForm((f) => ({ ...f, [k]: v }));
  return (
    <AdminLayout page={page} setPage={setPage} title="Solicitud de Mudanza" breadcrumb="Inicio / Solicitar Mudanza">
      <div style={{ maxWidth: 720, margin: "0 auto" }}>
        <Card style={{ padding: 32 }}>
          <h3 style={{ fontSize: 18, fontWeight: 700, color: TEXT_MAIN, marginBottom: 24 }}>Detalles de la Mudanza</h3>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20, marginBottom: 20 }}>
            <Input label="Origen" placeholder="Dirección de Origen" value={form.origin} onChange={set("origin")} />
            <Input label="Destino" placeholder="Dirección de Destino" value={form.destination} onChange={set("destination")} />
            <Input label="Fecha de Mudanza" placeholder="dd/mm/aaaa" value={form.date} onChange={set("date")} />
            <Input label="Hora Preferida" placeholder="hh:mm" value={form.time} onChange={set("time")} />
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20, marginBottom: 20 }}>
            <div>
              <label style={{ fontSize: 13, fontWeight: 500, color: TEXT_MAIN, display: "block", marginBottom: 6 }}>Tipo de Servicio</label>
              <select value={form.type} onChange={(e) => set("type")(e.target.value)}
                style={{ border: `1px solid ${BORDER}`, borderRadius: 8, padding: "10px 14px", width: "100%", fontSize: 14, color: TEXT_MAIN }}>
                <option value="">Seleccione el tipo</option>
                <option>Residencial</option><option>Comercial</option><option>Industrial</option>
              </select>
            </div>
            <Input label="Volumen Estimado (m³)" placeholder="Ej: 10" value={form.volume} onChange={set("volume")} />
          </div>
          <div style={{ marginBottom: 28 }}>
            <label style={{ fontSize: 13, fontWeight: 500, color: TEXT_MAIN, display: "block", marginBottom: 6 }}>Notas Adicionales</label>
            <textarea placeholder="Cualquier detalle adicional..." value={form.notes} onChange={(e) => set("notes")(e.target.value)} rows={4}
              style={{ border: `1px solid ${BORDER}`, borderRadius: 8, padding: "10px 14px", width: "100%", fontSize: 14, resize: "vertical", outline: "none", fontFamily: "inherit" }} />
          </div>
          <div style={{ display: "flex", gap: 12, justifyContent: "flex-end" }}>
            <Btn onClick={() => setPage("dashboard")} outline>Cancelar</Btn>
            <Btn onClick={() => setPage("quote")}>Enviar Solicitud →</Btn>
          </div>
        </Card>
      </div>
    </AdminLayout>
  );
}

function QuotePage({ page, setPage }) {
  return (
    <AdminLayout page={page} setPage={setPage} title="Cotización Automática" breadcrumb="Inicio / Solicitar / Cotización">
      <div style={{ maxWidth: 720, margin: "0 auto" }}>
        <Card style={{ padding: 32 }}>
          <h3 style={{ fontSize: 18, fontWeight: 700, color: TEXT_MAIN, marginBottom: 24, paddingBottom: 16, borderBottom: `1px solid ${BORDER}` }}>Detalles de la Cotización</h3>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20, marginBottom: 24 }}>
            {[["Tipo de Servicio","Mudanza Residencial"],["Origen","Calle Falsa 123, Ciudad"],["Destino","Av. Siempre Viva 742, Ciudad"],["Fecha Estimada","15 de Oct, 2026"],["Volumen Estimado","20 m³"]].map(([k,v]) => (
              <div key={k}><p style={{ fontSize: 12, color: TEXT_MUTED, marginBottom: 4 }}>{k}</p><p style={{ fontWeight: 600, color: TEXT_MAIN }}>{v}</p></div>
            ))}
          </div>
          <div style={{ background: "#f8fffe", border: `1px solid ${PRIMARY}30`, borderRadius: 12, padding: 24, textAlign: "center", marginBottom: 28 }}>
            <p style={{ fontSize: 13, color: TEXT_MUTED, marginBottom: 6 }}>Costo Total Estimado:</p>
            <p style={{ fontSize: 40, fontWeight: 700, color: SECONDARY, margin: 0 }}>$1,250.00</p>
          </div>

function DriverServices({ page, setPage, services, setSelectedId }) {
  const [filter, setFilter] = useState("Todos");
  const tabs = ["Todos","Asignado","En Camino","Completado"];
  const filtered = filter === "Todos" ? services : services.filter(s => s.status === filter);
  const statusColor = s => ({ "Asignado": "#3b82f6", "En Camino": WARNING, "En Carga": "#f97316", "Completado": SUCCESS, "Cancelado": DANGER })[s] || GRAY;
  return (
    <DriverLayout page={page} setPage={setPage} title="Mis Servicios" breadcrumb="Conductor / Servicios">
      <div style={{ display: "flex", gap: 8, marginBottom: 24 }}>
        {tabs.map(t => (
          <button key={t} onClick={() => setFilter(t)}
            style={{ padding: "7px 18px", borderRadius: 99, border: "none", cursor: "pointer", fontSize: 13, fontWeight: 600, background: filter === t ? PRIMARY : "#f1f5f9", color: filter === t ? "white" : TEXT_MUTED }}>
            {t}
          </button>
        ))}
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
        {filtered.map(s => (
          <Card key={s.id} style={{ overflow: "hidden" }}>
            <div style={{ padding: "10px 20px", background: statusColor(s.status) + "18", borderBottom: `2px solid ${statusColor(s.status)}`, display: "flex", justifyContent: "space-between" }}>
              <span style={{ fontWeight: 700, fontSize: 13, color: statusColor(s.status) }}>{s.status}</span>
              <span style={{ fontSize: 12, color: TEXT_MUTED, fontFamily: "monospace" }}>{s.id}</span>
            </div>
            <div style={{ padding: 20 }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 12 }}>
                <p style={{ fontWeight: 700, color: TEXT_MAIN, margin: 0 }}>{s.client}</p>
                <p style={{ fontSize: 12, color: TEXT_MUTED, margin: 0 }}>{s.date}</p>
              </div>
              <div style={{ fontSize: 13, color: TEXT_MUTED, marginBottom: 16 }}>
                <div style={{ display: "flex", gap: 8, marginBottom: 6 }}>
                  <div style={{ width: 8, height: 8, borderRadius: "50%", background: SUCCESS, marginTop: 4, flexShrink: 0 }} />
                  <span>{s.origin}</span>
                </div>
                <div style={{ display: "flex", gap: 8 }}>
                  <div style={{ width: 8, height: 8, borderRadius: "50%", background: DANGER, marginTop: 4, flexShrink: 0 }} />
                  <span>{s.destination}</span>
                </div>
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div style={{ display: "flex", gap: 12, fontSize: 12, color: TEXT_MUTED }}>
                  <span>{s.distance}</span>
                  <span>{s.volume}</span>
                </div>
                <Btn size="sm" onClick={() => { setSelectedId(s.id); setPage("d_service_detail"); }}>Ver Detalle →</Btn>
              </div>
            </div>
          </Card>
        ))}
        {filtered.length === 0 && (
          <div style={{ textAlign: "center", padding: "60px 20px", color: TEXT_MUTED }}>
            <p style={{ fontSize: 40, marginBottom: 8, color: BORDER }}>—</p>
            <p>Sin servicios en esta categoría</p>
          </div>
        )}
      </div>
    </DriverLayout>
  );
}

function DriverServiceDetail({ page, setPage, services, setServices, selectedId }) {
  const service = services.find(s => s.id === selectedId) || services[0];
  const nextStatus = { "Asignado": "En Camino", "En Camino": "En Carga", "En Carga": "Completado" };
  const statusColor = s => ({ "Asignado": "#3b82f6", "En Camino": WARNING, "En Carga": "#f97316", "Completado": SUCCESS, "Cancelado": DANGER })[s] || GRAY;
  function advance() {
    const next = nextStatus[service.status];
    if (next) setServices(ss => ss.map(s => s.id === service.id ? { ...s, status: next } : s));
  }
  if (!service) return null;
  return (
    <DriverLayout page={page} setPage={setPage} title={`Servicio ${service.id}`} breadcrumb="Conductor / Servicios / Detalle">
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 24 }}>
        <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
          <Card style={{ padding: 24 }}>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 20 }}>
              <h3 style={{ fontSize: 16, fontWeight: 700, color: TEXT_MAIN, margin: 0 }}>Información del Servicio</h3>
              <Badge label={service.status} color={statusColor(service.status)} />
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 20 }}>
              {[["Cliente",service.client],["Fecha",service.date],["Hora",service.time],["Distancia",service.distance],["Volumen",service.volume]].map(([k,v]) => (
                <div key={k}><p style={{ fontSize: 12, color: TEXT_MUTED, marginBottom: 4 }}>{k}</p><p style={{ fontWeight: 600, color: TEXT_MAIN, margin: 0 }}>{v}</p></div>
              ))}
            </div>
            <div style={{ marginBottom: 16 }}>
              <p style={{ fontSize: 12, color: TEXT_MUTED, marginBottom: 8 }}>Ruta</p>
              <div style={{ display: "flex", flexDirection: "column", gap: 8, padding: "12px 16px", background: "#f8fafc", borderRadius: 10 }}>
                <div style={{ display: "flex", gap: 10, alignItems: "center" }}><div style={{ width: 10, height: 10, borderRadius: "50%", background: SUCCESS, flexShrink: 0 }} /><span style={{ fontSize: 13, color: TEXT_MAIN }}>{service.origin}</span></div>
                <div style={{ display: "flex", gap: 10, alignItems: "center" }}><div style={{ width: 10, height: 10, borderRadius: "50%", background: DANGER, flexShrink: 0 }} /><span style={{ fontSize: 13, color: TEXT_MAIN }}>{service.destination}</span></div>
              </div>
            </div>
            {service.notes && (
              <div style={{ background: "#fffbeb", border: `1px solid #fde68a`, borderRadius: 10, padding: 14 }}>
                <p style={{ fontSize: 12, fontWeight: 700, color: "#92400e", margin: "0 0 4px" }}>Notas</p>
                <p style={{ fontSize: 13, color: "#78350f", margin: 0 }}>{service.notes}</p>
              </div>
            )}
          </Card>
          <Card style={{ padding: 24 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 16, marginBottom: 20 }}>
              <div style={{ width: 48, height: 48, borderRadius: "50%", background: PRIMARY, display: "flex", alignItems: "center", justifyContent: "center", color: "white", fontWeight: 700 }}>
                {service.client.split(" ").map(w=>w[0]).join("").slice(0,2)}
              </div>
              <div>
                <p style={{ fontWeight: 700, color: TEXT_MAIN, margin: 0 }}>{service.client}</p>
                <p style={{ fontSize: 12, color: TEXT_MUTED, margin: 0 }}>{service.phone}</p>
              </div>
            </div>
            <Btn fullWidth onClick={() => alert("Llamando a " + service.client + "\n" + service.phone)}>Llamar al Cliente</Btn>
          </Card>
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
          {nextStatus[service.status] && (
            <Card style={{ padding: 24, background: `linear-gradient(135deg, ${PRIMARY}10, ${SECONDARY}10)`, border: `1px solid ${PRIMARY}30` }}>
              <h3 style={{ fontSize: 15, fontWeight: 700, color: TEXT_MAIN, marginBottom: 12 }}>Avanzar Estado</h3>
              <p style={{ fontSize: 13, color: TEXT_MUTED, marginBottom: 20 }}>Estado actual: <strong>{service.status}</strong></p>
              <Btn fullWidth onClick={advance}>Marcar como "{nextStatus[service.status]}"</Btn>
            </Card>
          )}
          {service.status === "Completado" && (
            <Card style={{ padding: 24, background: SUCCESS + "10", border: `1px solid ${SUCCESS}30` }}>
              <p style={{ textAlign: "center", color: SUCCESS, fontWeight: 700, fontSize: 16, margin: 0 }}>Servicio Completado</p>
            </Card>
          )}
          <Card style={{ padding: 24 }}>
            <h3 style={{ fontSize: 15, fontWeight: 700, color: TEXT_MAIN, marginBottom: 16 }}>Acciones Rápidas</h3>
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              <Btn fullWidth outline onClick={() => window.open("https://maps.google.com", "_blank")}>Ver en Mapa</Btn>
              <Btn fullWidth outline onClick={() => alert("Función disponible desde la app móvil.")}>Tomar Foto</Btn>
              <Btn fullWidth outline onClick={() => { const n = prompt("Escribe tu nota:"); if(n) alert("Nota guardada: " + n); }}>Añadir Nota</Btn>
              <Btn fullWidth outline color={DANGER} onClick={() => { const p = prompt("Describe el problema:"); if(p) alert("Problema reportado. El supervisor fue notificado."); }}>Reportar Problema</Btn>
            </div>
          </Card>
          <div style={{ display: "flex", gap: 10 }}>
            <Btn outline onClick={() => setPage("d_services")} fullWidth>← Volver</Btn>
          </div>
        </div>
      </div>
    </DriverLayout>
  );
}

  { id: "MUD-1234", client: "Laura Martínez", origin: "Calle Roble 45, Col. Centro", destination: "Av. Las Palmas 210, Col. Norte", date: "26 Oct 2026", time: "08:00", distance: "12.4 km", volume: "18 m³", status: "En Camino", phone: "+57 300 111 2222", notes: "Hay piano en el tercer piso, sin elevador." },

  { id: "MUD-1230", client: "Ana Torres", origin: "Calle Cedro 12", destination: "Plaza Reforma 400", date: "24 Oct 2026", time: "09:00", distance: "5.2 km", volume: "6 m³", status: "Completado", phone: "+57 300 555 6666", notes: "" },
];

function App() {
  const [page, setPage] = useState("login");
  const [role, setRole] = useState("admin");
  const [services, setServices] = useState(INITIAL_SERVICES);
  const [selectedServiceId, setSelectedServiceId] = useState("");

  function handleLogin(r) {
    setRole(r);
    if (r === "admin") setPage("dashboard");
    else if (r === "conductor") setPage("d_dashboard");
    else setPage("c_dashboard");
  }

  // Auth
  if (page === "login") return <LoginPage onLogin={handleLogin} />;

  // Admin pages
  if (role === "admin") {
    const props = { page, setPage };
    if (page === "dashboard") return <AdminDashboard {...props} />;
    if (page === "request") return <RequestPage {...props} />;
    if (page === "quote") return <QuotePage {...props} />;
    if (page === "agenda") return <AgendaPage {...props} />;
    if (page === "vehicles") return <VehiclesPage {...props} />;
    if (page === "employees") return <EmployeesPage {...props} />;
    if (page === "payments") return <PaymentsPage {...props} />;
    if (page === "reports") return <ReportsPage {...props} />;
    if (page === "tracking") return <TrackingPage {...props} />;
  }

  // Client pages
  if (role === "cliente") {
    const props = { page, setPage };
    if (page === "c_dashboard") return <ClientDashboard {...props} />;
    if (page === "c_request") return <ClientRequestPage {...props} />;
    if (page === "c_tracking") return <ClientTrackingPage {...props} />;
    if (page === "c_history") return <ClientHistoryPage {...props} />;
    if (page === "c_profile") return <ClientProfilePage {...props} />;
  }

  // Driver pages
  if (role === "conductor") {
    const driverProps = { page, setPage, services, setServices, setSelectedId: setSelectedServiceId };
    if (page === "d_dashboard") return <DriverDashboard {...driverProps} />;
    if (page === "d_services") return <DriverServices {...driverProps} />;
    if (page === "d_service_detail") return <DriverServiceDetail {...driverProps} selectedId={selectedServiceId} />;
    if (page === "d_vehicle") return <DriverVehicle page={page} setPage={setPage} />;
    if (page === "d_profile") return <DriverProfile page={page} setPage={setPage} />;
  }

  return <LoginPage onLogin={handleLogin} />;
}


    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
